<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNMP Network Monitor</title>
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #0d1117;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #c9d1d9;
        }
        
        .dashboard-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: none; /* Hidden by default until login */
        }

        /* --- Login Screen Styles --- */
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .login-input {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }
        .login-input:focus {
            background-color: #0d1117;
            border-color: #58a6ff;
            color: #c9d1d9;
            box-shadow: none;
        }
        /* -------------------------- */

        .page-title {
            color: #e6edf3;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .card-custom {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .table { margin-bottom: 0; }
        
        .table th {
            background-color: #21262d !important;
            color: #8b949e;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #30363d;
            padding: 16px;
        }

        .table td {
            border-bottom: 1px solid #30363d;
            vertical-align: middle;
            color: #c9d1d9;
            font-size: 0.95rem;
            padding: 16px;
        }

        .table tbody tr:hover td {
            background-color: #1c2128;
        }

        .node-id { color: #8b949e; font-family: 'Courier New', Courier, monospace; }
        .node-name { color: #58a6ff; font-weight: 600; font-size: 1.05rem; }
        .node-ip { 
            font-family: 'Courier New', Courier, monospace; 
            color: #e6edf3; 
            background: #21262d; 
            padding: 4px 8px; 
            border-radius: 6px; 
            border: 1px solid #30363d;
        }
        .trap-msg { color: #e6edf3; font-weight: 500; }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            display: inline-block;
        }
        
        .bg-up { background-color: rgba(46, 160, 67, 0.15); color: #3fb950; border: 1px solid rgba(46, 160, 67, 0.4); }
        .bg-down { background-color: rgba(248, 81, 73, 0.15); color: #ff7b72; border: 1px solid rgba(248, 81, 73, 0.4); }
        .bg-warning-custom { background-color: rgba(210, 153, 34, 0.15); color: #d29922; border: 1px solid rgba(210, 153, 34, 0.4); }

        .bg-trap-open { background-color: rgba(248, 81, 73, 0.15); color: #ff7b72; border: 1px solid rgba(248, 81, 73, 0.4); }
        .bg-trap-resolved { background-color: rgba(46, 160, 67, 0.15); color: #3fb950; border: 1px solid rgba(46, 160, 67, 0.4); }

        .btn-sync {
            background-color: #238636;
            color: white;
            font-weight: 600;
            border: 1px solid rgba(240, 246, 252, 0.1);
            transition: 0.2s;
        }
        .btn-sync:hover { background-color: #2ea043; color: white; }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-container text-center">
        <h3 class="page-title mb-4">SNMP Login</h3>
        <input type="text" id="username" class="form-control login-input mb-3" placeholder="Username (admin)" value="admin">
        <input type="password" id="password" class="form-control login-input mb-4" placeholder="Password">
        <button class="btn btn-sync w-100 py-2" onclick="performLogin()">Login</button>
        <div id="loginError" class="text-danger mt-3" style="display: none; font-size: 0.9rem;"></div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboardScreen" class="dashboard-container">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="page-title">SNMP Network Dashboard</h3>
            <div>
                <button class="btn btn-outline-secondary btn-sm px-3 py-2 me-2" onclick="logout()">Logout</button>
                <button class="btn btn-sync btn-sm px-3 py-2" onclick="syncAll()">↻ Sync Data</button>
            </div>
        </div>

        <!-- Nodes Table -->
        <h5 class="page-title mb-3" style="font-size: 1.2rem; color: #8b949e;">Network Elements (Nodes)</h5>
        <div class="card-custom">
            <div class="table-responsive">
                <table class="table table-borderless">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Node Name</th>
                            <th>IP Address</th>
                            <th>Port</th>
                            <th>Status</th>
                            <th>Last Update</th>
                        </tr>
                    </thead>
                    <tbody id="nodesTableBody">
                        <tr><td colspan="6" class="text-center py-4 text-muted">Loading nodes...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Traps Table -->
        <h5 class="page-title mt-5 mb-3" style="font-size: 1.2rem; color: #8b949e;">Recent Alarms (Traps History)</h5>
        <div class="card-custom">
            <div class="table-responsive">
                <table class="table table-borderless">
                    <thead>
                        <tr>
                            <th>Trap ID</th>
                            <th>Source IP</th>
                            <th>Message / Description</th>
                            <th>Status</th>
                            <th>Time Received</th>
                        </tr>
                    </thead>
                    <tbody id="trapsTableBody">
                        <tr><td colspan="5" class="text-center py-4 text-muted">Loading traps...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let jwtToken = localStorage.getItem('snmp_token');
        let refreshInterval = null;

        // Check login status on page load
        if (jwtToken) {
            showDashboard();
        }

        async function performLogin() {
            // For now, it calls the dummy login endpoint which ignores credentials and returns a token
            try {
                let response = await fetch('/api/login', {
                    method: 'POST'
                });
                
                if (response.ok) {
                    let data = await response.json();
                    let parsedData = JSON.parse(data); // Javalin currently returns double-stringified JSON
                    jwtToken = parsedData.token;
                    localStorage.setItem('snmp_token', jwtToken);
                    document.getElementById('loginError').style.display = 'none';
                    showDashboard();
                } else {
                    showError("Invalid credentials");
                }
            } catch (error) {
                showError("Connection failed");
            }
        }

        function logout() {
            localStorage.removeItem('snmp_token');
            jwtToken = null;
            clearInterval(refreshInterval);
            document.getElementById('dashboardScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
        }

        function showDashboard() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'block';
            syncAll();
            refreshInterval = setInterval(syncAll, 3000);
        }

        function showError(msg) {
            const errorDiv = document.getElementById('loginError');
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
        }

        // Helper function for API requests
        async function fetchWithAuth(url) {
            let response = await fetch(url, {
                headers: {
                    'Authorization': 'Bearer ' + jwtToken
                }
            });

            if (response.status === 401) {
                logout(); // Token expired or invalid
                throw new Error("Unauthorized");
            }
            return response;
        }

        async function fetchNodes() {
            try {
                let response = await fetchWithAuth('/api/nodes');
                let nodes = await response.json();
                let tbody = document.getElementById('nodesTableBody');
                tbody.innerHTML = '';

                if (nodes.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No nodes registered.</td></tr>';
                    return;
                }

                nodes.forEach(node => {
                    let statusBadge = '';
                    if (node.status === 'UP') {
                        statusBadge = '<span class="status-badge bg-up">UP</span>';
                    } else if (node.status === 'DOWN') {
                        statusBadge = '<span class="status-badge bg-down">DOWN</span>';
                    } else {
                        statusBadge = `<span class="status-badge bg-warning-custom">${node.status}</span>`;
                    }

                    let dateObj = new Date(node.createdAt);
                    let formattedDate = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    let row = `<tr>
                        <td class="node-id">#${node.id.toString().padStart(4, '0')}</td>
                        <td class="node-name">${node.name}</td>
                        <td><span class="node-ip">${node.ipAddress}</span></td>
                        <td style="color: #8b949e;">${node.port}</td>
                        <td>${statusBadge}</td>
                        <td style="color: #8b949e; font-size: 0.85rem;">${formattedDate}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error(error);
            }
        }

        async function fetchTraps() {
            try {
                let response = await fetchWithAuth('/api/traps');
                let traps = await response.json();
                let tbody = document.getElementById('trapsTableBody');
                tbody.innerHTML = '';

                if (traps.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">No traps received yet.</td></tr>';
                    return;
                }

                traps.forEach(trap => {
                    let statusBadge = '';
                    if (trap.status === 'OPEN') {
                        statusBadge = '<span class="status-badge bg-trap-open">OPEN</span>';
                    } else {
                        statusBadge = `<span class="status-badge bg-trap-resolved">${trap.status}</span>`;
                    }

                    let dateObj = new Date(trap.receivedAt);
                    let formattedDate = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});

                    let row = `<tr>
                        <td class="node-id">#${trap.id.toString().padStart(4, '0')}</td>
                        <td><span class="node-ip">${trap.sourceIp}</span></td>
                        <td class="trap-msg">${trap.message ? trap.message : trap.trapOid}</td>
                        <td>${statusBadge}</td>
                        <td style="color: #8b949e; font-size: 0.85rem;">${formattedDate}</td>
                    </tr>`;
                    tbody.innerHTML += row;
                });
            } catch (error) {
                console.error(error);
            }
        }

        function syncAll() {
            if(jwtToken) {
                fetchNodes();
                fetchTraps();
            }
        }
    </script>
</body>
</html>
